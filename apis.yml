apis:
  - aid: sevenrooms:rest-api
    name: SevenRooms API
    description: >-
      The SevenRooms API is a RESTful interface for hospitality data and
      operations. It exposes reservations, guest profiles, and feedback scores,
      and supports retrieving venue info, searching shift-level availability,
      and creating, modifying, or cancelling reservations including party size,
      table assignment, booking channel, and tags. Authentication uses OAuth2
      with a provisioned client_id and client_secret scoped to a venue group.
      Access to the documentation is gated to approved venue operators and
      integration partners through individually provisioned accounts.
    humanURL: https://api-docs.sevenrooms.com/
    tags:
      - Reservations
      - Availability
      - Guest Profiles
      - Feedback
    properties:
      - type: Documentation
        url: https://api-docs.sevenrooms.com/
      - type: APIReference
        url: https://api-docs.sevenrooms.com/
      - type: Authentication
        url: https://api-docs.sevenrooms.com/
        title: OAuth2 (client_id / client_secret)
