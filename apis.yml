  - type: Features
    data:
      - name: Reservations & Waitlist
        description: >-
          Real-time availability, online and in-house bookings, and waitlist
          management across shifts and seating areas.
      - name: CRM & Guest Profiles
        description: >-
          Automatic guest profile building that centralizes preferences, visit
          history, spend, and tags for personalized service.
      - name: Table & Floor Management
        description: Seating optimization and floor-plan control for venue operations.
      - name: Email & SMS Marketing
        description: >-
          Automated, multi-channel marketing campaigns driven by guest profile
          and behavioral data.
      - name: Loyalty & Perks
        description: Guest retention, rewards, and perks programs.
      - name: Event & Private Dining Management
        description: Booking and management of private dining and special events.
      - name: Reputation Management
        description: Review monitoring and response across feedback channels.
      - name: Voice AI
        description: AI-powered phone reservation automation and phone-to-booking conversion.
      - name: Online Ordering
        description: Direct-to-consumer online ordering platform.
      - name: Reporting & Analytics
        description: Business intelligence dashboards for venue performance.
  - type: UseCases
    data:
      - name: Unify the Restaurant Tech Stack
        description: >-
          Consolidate reservations, CRM, marketing, and operations across
          100-plus integrations into a single hospitality platform.
      - name: Multi-Channel Reservation Distribution
        description: >-
          Accept and synchronize bookings across discovery and booking channels
          such as Google, TheFork, and TripAdvisor.
      - name: Programmatic Availability & Booking
        description: >-
          Retrieve venue info, search shift-level availability, and create,
          modify, or cancel reservations via the RESTful API.
      - name: Guest Data Capture & Personalization
        description: >-
          Build unified guest profiles from reservations, POS, payments, and
          WiFi capture to drive personalized marketing and service.
