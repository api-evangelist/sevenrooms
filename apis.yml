aid: sevenrooms
name: SevenRooms
description: >-
  SevenRooms is a guest experience, reservations, and retention platform for
  the hospitality industry, helping restaurants, hotels, nightlife, and
  entertainment venues manage reservations, waitlists, CRM, and marketing.
  Founded in 2011 and serving clients in more than 1,000 cities worldwide, the
  platform unifies a restaurant tech stack with 100-plus integrations across
  POS, payments, booking channels, delivery, and marketing tools, plus a
  flexible RESTful API. The API exposes reservation, guest profile, and
  feedback data and supports searching availability and creating bookings.
  Access to the partner-facing developer documentation is gated to approved
  venue operators and integration partners via individually provisioned
  accounts.
